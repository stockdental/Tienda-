<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Suministros Especializados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .product-card { 
            background: white; 
            border-radius: 1.2rem; 
            overflow: hidden; 
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }
        .product-card:hover { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-xl italic shadow-lg">S</div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-blue-900 leading-none">STOCKDENTAL</h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1 text-blue-900">Suministros Especializados</p>
                </div>
            </div>
            <div class="relative p-2 bg-slate-50 rounded-full border border-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-6xl mx-auto px-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 py-10 pb-40">
        <!-- Los productos aparecerán aquí -->
    </main>

    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-lg transform translate-y-full transition-transform duration-500 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <p id="total-price" class="text-3xl font-black text-blue-900 leading-tight">0,00 Bs.</p>
            </div>
            <button onclick="sendWhatsApp()" class="w-full md:w-auto bg-blue-700 text-white px-12 py-4 rounded-2xl font-black text-sm tracking-widest hover:bg-blue-800 shadow-xl transition-all">
                CONFIRMAR POR WHATSAPP
            </button>
        </div>
    </div>

    <script>
        const productos = [
            { id: 1, name: "Yeso Whip Mix T4", price: 6599, cat: "tecnico", img: "https://http2.mlstatic.com/D_NQ_NP_960527-MLV46340536417_062021-O.webp", desc: "1 Kg extraduro para troqueles." },
            { id: 2, name: "Guantes de Nitrilo Ecomed", price: 5628, cat: "odontologo", img: "https://m.media-amazon.com/images/I/71Y-BfW5bXL._AC_SL1500_.jpg", desc: "Caja 100u. Sin látex." },
            { id: 3, name: "Cera Base Bon Dent", price: 7198, cat: "tecnico", img: "https://pro-dentalsupplies.com/cdn/shop/products/baseplatewax_1024x1024.jpg?v=1548881260", desc: "Modelado de prótesis rosa." },
            { id: 4, name: "Yeso Blanco Tipo II", price: 1800, cat: "estudiante", img: "https://acdn.mitiendanube.com/stores/002/097/349/products/yeso-pariss-blanco1-e51c89076f827038e916510842851608-640-0.webp", desc: "Modelo de estudio 1kg." },
            { id: 5, name: "Acrílico Polímero/Líquido", price: 3666, cat: "tecnico", img: "https://http2.mlstatic.com/D_NQ_NP_600612-MLV44636906560_012021-O.jpg", desc: "Autocurado alta densidad." }
        ];

        let cart = {};

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            productos.forEach(p => {
                const qty = cart[p.id] ? cart[p.id].qty : 0;
                container.innerHTML += `
                    <div class="product-card p-6">
                        <img src="${p.img}" class="w-full h-48 object-contain mb-4">
                        <h3 class="text-lg font-bold text-slate-800 leading-tight h-12">${p.name}</h3>
                        <div class="mt-6 flex items-center justify-between">
                            <span class="text-2xl font-black text-slate-900">${p.price.toLocaleString('es-VE')} Bs.</span>
                            <div class="flex items-center gap-3 bg-slate-100 p-1.5 rounded-xl">
                                <button onclick="updateQty(${p.id}, -1)" class="qty-btn bg-white text-blue-800 shadow-sm">-</button>
                                <span id="qty-${p.id}" class="text-sm font-black w-4 text-center">${qty}</span>
                                <button onclick="updateQty(${p.id}, 1)" class="qty-btn bg-blue-800 text-white shadow-md">+</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, delta) {
            const p = productos.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
            cart[id].qty += delta;
            if (cart[id].qty < 0) cart[id].qty = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id].qty;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            let count = 0;
            for (let id in cart) {
                total += cart[id].price * cart[id].qty;
                count += cart[id].qty;
            }
            document.getElementById('total-price').innerText = total.toLocaleString('es-VE') + " Bs.";
            document.getElementById('cart-count').innerText = count;
            const bar = document.getElementById('checkout-bar');
            if (total > 0) bar.classList.remove('translate-y-full');
            else bar.classList.add('translate-y-full');
        }

        function sendWhatsApp() {
            let message = "🦷 *PEDIDO STOCKDENTAL*%0A";
            for (let id in cart) {
                if(cart[id].qty > 0) message += `• ${cart[id].qty}x ${cart[id].name}%0A`;
            }
            window.open(`https://wa.me/584243391197?text=${message}`);
        }

        render();
    </script>
</body>
</html>
