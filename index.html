<div id="cart-modal" class="modal" onclick="if(event.target == this) toggleModal('cart-modal')">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <button onclick="toggleModal('cart-modal')" class="text-[10px] font-black text-blue-400 bg-blue-50 px-4 py-2 rounded-xl uppercase tracking-widest">← Seguir comprando</button>
                <h2 class="text-lg font-800 text-blue-900 uppercase italic">Tu Pedido</h2>
            </div>
            
            <div class="space-y-3 mb-6">
                <input type="text" id="cust-name" oninput="validateForm()" class="w-full bg-slate-50 border rounded-xl p-4 font-bold text-sm outline-none" placeholder="Nombre completo">
                <input type="text" id="cust-address" oninput="validateForm()" class="w-full bg-slate-50 border rounded-xl p-4 font-bold text-sm outline-none" placeholder="Dirección / Clínica">
                
                <select id="delivery-zone" onchange="updateCartList(); validateForm()" class="w-full bg-slate-50 border rounded-xl p-4 font-bold text-sm outline-none">
                    <option value="none">Zona de Delivery (Tasa BCV)</option>
                    <option value="3">Maracay (+3$)</option>
                    <option value="4">Turmero (+4$)</option>
                    <option value="5">Cagua (+5$)</option>
                    <option value="0">Cobro Destino</option>
                </select>

                <div class="bg-blue-50 rounded-xl p-4 border border-blue-100">
                    <p class="text-[9px] text-blue-900 font-black text-center mb-2 uppercase">Pago Móvil: V-17888104 | 0424-339.1197</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="pay-bank" oninput="validateForm()" placeholder="Banco" class="bg-white p-3 rounded-lg text-xs font-bold border">
                        <input type="text" id="pay-ref" oninput="validateForm()" placeholder="Ref (4 dig)" class="bg-white p-3 rounded-lg text-xs font-bold border">
                    </div>
                    <input type="number" id="pay-amount" oninput="validateForm()" placeholder="Monto en Bs." class="w-full bg-white p-3 rounded-lg text-xs font-bold border mt-2">
                </div>
            </div>

            <div id="cart-list" class="space-y-2 mb-4 font-bold text-[11px]"></div>

            <div class="flex justify-between items-center mb-6 border-t pt-4">
                <div class="flex flex-col">
                    <span class="font-black text-slate-400 text-[10px] uppercase">Total a Transferir</span>
                    <span class="text-[8px] text-slate-400 italic">*Delivery calculado a tasa BCV</span>
                </div>
                <span id="modal-total" class="text-3xl font-black text-blue-400">0 Bs.</span>
            </div>
            <button id="btn-send" disabled onclick="sendWhatsApp()" class="w-full text-white py-5 rounded-2xl font-black uppercase shadow-xl" style="background-color: #87CEEB;">Confirmar WhatsApp</button>
        </div>
    </div>
