<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Insumos Profesionales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .category-btn { transition: all 0.2s; border: 2px solid #e2e8f0; white-space: nowrap; background: white; }
        .category-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(8px); }
        .modal.active { display: flex; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; max-height: 90vh; overflow-y: auto; }
        .brand-item { font-size: 14px; font-weight: 800; color: #64748b; font-style: italic; letter-spacing: -0.05em; opacity: 0.6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white sticky top-0 z-50 border-b border-slate-200 px-6 py-4">
        <div class="max-w-xl mx-auto flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-800 text-blue-900 tracking-tighter uppercase leading-none">Stock<span class="text-blue-500">Dental</span></h1>
                <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase mt-1">Insumos y Materiales Odontológicos</p>
            </div>
            <button onclick="toggleModal('cart-modal')" class="relative p-3 bg-blue-50 rounded-2xl text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>

        <div class="max-w-xl mx-auto flex justify-between items-center mb-6 px-4 py-3 bg-slate-50 rounded-xl border border-slate-100">
            <span class="brand-item">ivoclar</span>
            <span class="brand-item" style="color: #ed1c24;">3M</span>
            <span class="brand-item" style="font-family: serif;">VITA</span>
            <span class="brand-item">KULZER</span>
        </div>

        <div class="max-w-xl mx-auto mb-4">
            <div class="bg-slate-100 rounded-xl flex items-center px-4 py-2 border border-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" id="searchInput" oninput="filterEverything()" placeholder="Buscar material o equipo..." class="bg-transparent w-full outline-none text-sm font-semibold">
            </div>
        </div>

        <div class="max-w-xl mx-auto flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button onclick="setCategory('Todos', this)" class="category-btn active px-4 py-2 rounded-xl text-xs font-black">Todos</button>
            <button onclick="setCategory('Odontólogo', this)" class="category-btn px-4 py-2 rounded-xl text-xs font-black">Odontólogo</button>
            <button onclick="setCategory('Estudiantes', this)" class="category-btn px-4 py-2 rounded-xl text-xs font-black">Estudiantes</button>
            <button onclick="setCategory('Técnicos', this)" class="category-btn px-4 py-2 rounded-xl text-xs font-black">Técnicos</button>
        </div>
    </header>

    <main id="catalog" class="max-w-xl mx-auto p-6 flex flex-col gap-6 pb-32"></main>

    <div id="cart-modal" class="modal" onclick="if(event.target == this) toggleModal('cart-modal')">
        <div class="modal-content">
            <h2 class="text-2xl font-800 text-blue-900 mb-6 uppercase italic">Confirmar Pedido</h2>
            <div class="space-y-3 mb-6">
                <input type="text" id="cust-name" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-xl p-4 outline-none font-bold text-sm" placeholder="Nombre completo">
                <input type="text" id="cust-address" class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-xl p-4 outline-none font-bold text-sm" placeholder="Dirección / Clínica">
            </div>
            <div class="bg-blue-50 rounded-xl p-4 mb-6 text-blue-900 text-[11px] font-bold">
                <p class="uppercase opacity-50 mb-1 text-[9px]">Pago Móvil</p>
                <p>V-17888104 | 0424-339.1197 | Venezuela / Mercantil</p>
            </div>
            <div id="cart-list" class="space-y-3 mb-6"></div>
            <div class="border-t pt-4 mb-8 flex justify-between items-center">
                <span class="font-bold text-slate-400 text-xs uppercase">Total Estimado</span>
                <span id="modal-total" class="text-3xl font-black text-blue-600">0 Bs.</span>
            </div>
            <button onclick="sendWhatsApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg uppercase tracking-widest hover:bg-blue-700 transition-colors">Enviar por WhatsApp</button>
        </div>
    </div>

    <script>
        const productos = [
            { id: 1, name: "Yeso WhipMix T4", price: 6599, img: "img/yeso-t4.jpg.jpeg", cat: "Técnicos", ficha: "Yeso tipo IV de alta resistencia. Ideal para prótesis fija y troqueles." },
            { id: 2, name: "Guantes de Nitrilo", price: 5628, img: "img/guantes.jpg.jpeg", cat: "Odontólogo", ficha: "Libres de látex y polvo. Alta resistencia y sensibilidad táctil." },
            { id: 3, name: "Acrílico Líquido", price: 3666, img: "img/acrilico.jpg.jpeg", cat: "Técnicos", ficha: "Monómero de termocurado estable. Procesado sin burbujas." },
            { id: 4, name: "Cera Base Tropical", price: 7198, img: "img/cera-base.jpg.jpeg", cat: "Estudiantes", ficha: "Ideal para climas cálidos. No se deforma en el montaje." },
            { id: 5, name: "Yeso Blanco", price: 2500, img: "img/yeso-blanco.jpg.jpeg", cat: "Estudiantes", ficha: "Yeso tipo II para modelos de estudio y montajes rápidos." }
        ];

        let cart = {};
        let currentCat = 'Todos';

        function render(data = productos) {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            data.forEach(p => {
                const qty = cart[p.id] ? cart[p.id].qty : 0;
                container.innerHTML += `
                    <div class="product-card">
                        <div class="h-64 bg-white flex items-center justify-center p-4">
                            <img src="${p.img}" class="max-h-full object-contain" onerror="this.src='https://placehold.co/400x400?text=Error+de+Extensión'">
                        </div>
                        <div class="p-6 border-t border-slate-50">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="text-lg font-bold text-blue-900 leading-tight">${p.name}</h3>
                                <button onclick="alert('${p.ficha}')" class="text-blue-500 bg-blue-50 px-2 py-1 rounded-md text-[10px] font-black uppercase">Ficha</button>
                            </div>
                            <p class="text-[11px] text-slate-500 mb-4 line-clamp-2 italic">${p.ficha}</p>
                            <div class="flex justify-between items-end">
                                <div>
                                    <span class="text-2xl font-black text-blue-600">${p.price.toLocaleString('es-VE')} <small class="text-xs">Bs.</small></span>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">Tasa Oficial BCV</p>
                                </div>
                                <div class="flex items-center bg-slate-100 rounded-xl p-1">
                                    <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-lg shadow-sm text-blue-600 font-bold">-</button>
                                    <span class="w-8 text-center font-bold text-blue-900">${qty}</span>
                                    <button onclick="updateQty(${p.id}, 1)" class="w-8 h-8 flex items-center justify-center bg-blue-600 rounded-lg shadow-sm text-white font-bold">+</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterEverything() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = productos.filter(p => p.name.toLowerCase().includes(term) && (currentCat === 'Todos' || p.cat === currentCat));
            render(filtered);
        }

        function setCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'bg-blue-600', 'text-white'));
            btn.classList.add('active');
            filterEverything();
        }

        function updateQty(id, delta) {
            if (!cart[id]) cart[id] = { ...productos.find(p => p.id === id), qty: 0 };
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateInterface();
        }

        function removeItem(id) {
            delete cart[id];
            updateInterface();
            updateCartList();
        }

        function updateInterface() {
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((a, b) => a + b.qty, 0);
            filterEverything();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
            if(document.getElementById(id).classList.contains('active')) updateCartList();
        }

        function updateCartList() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = "";
            Object.values(cart).forEach(item => {
                const sub = item.price * item.qty; total += sub;
                list.innerHTML += `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <div class="flex-1">
                        <p class="font-bold text-blue-900 text-sm leading-none">${item.name}</p>
                        <p class="text-[10px] text-blue-400 font-bold mt-1 uppercase">${item.qty} unidad(es)</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-blue-600 text-sm">${sub.toLocaleString('es-VE')} Bs.</span>
                        <button onclick="removeItem(${item.id})" class="text-red-400 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('modal-total').innerText = total.toLocaleString('es-VE') + " Bs.";
        }

        function sendWhatsApp() {
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            if(!name || !address || Object.keys(cart).length === 0) return alert("Por favor, llena tus datos y selecciona productos.");
            let total = 0;
            let msg = `🦷 *PEDIDO STOCKDENTAL*%0A👤 *Cliente:* ${name}%0A📍 *Dirección:* ${address}%0A%0A`;
            Object.values(cart).forEach(i => {
                const s = i.price * i.qty; total += s;
                msg += `• ${i.name} x${i.qty} (${s.toLocaleString('es-VE')} Bs.)%0A`;
            });
            msg += `%0A💰 *TOTAL:* ${total.toLocaleString('es-VE')} Bs.%0A📌 _Tasa BCV oficial. Pedido sujeto a disponibilidad._`;
            window.open(`https://wa.me/584243391197?text=${msg}`);
        }

        render();
    </script>
</body>
</html>
