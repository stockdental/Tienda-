        :root { --azul-suave: #87CEEB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .bg-suave { background-color: var(--azul-suave); }

        .product-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .category-btn { transition: 0.2s; border: 2px solid #e2e8f0; font-weight: 800; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        /* Botón de categoría con el nuevo color suave */
        .category-btn.active { background-color: var(--azul-suave); color: white; border-color: var(--azul-suave); }
        /* Sombras para el header y carrito para coincidir con el diseño suave */
        .shadow-suave { shadow-lg shadow-blue-50; }
