<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockDental | Checkout Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(4px); }
        .modal.active { display: flex; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; max-height: 85vh; overflow-y: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-blue-900 tracking-tighter uppercase">Stock<span class="text-blue-500">Dental</span></h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Suministros Especializados</p>
            </div>
            <button onclick="toggleModal('cart-modal')" class="relative p-2 bg-blue-50 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>
    </header>

    <!-- Filtros -->
    <nav class="max-w-xl mx-auto flex gap-3 p-4 overflow-x-auto no-scrollbar">
        <button onclick="render('todos')" class="px-5 py-2 bg-blue-600 text-white rounded-full text-xs font-bold shadow-md">Todos</button>
        <button onclick="render('odontologo')" class="px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold">Clínica</button>
        <button onclick="render('tecnico')" class="px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold">Laboratorio</button>
    </nav>

    <!-- Catálogo -->
    <main id="catalog" class="max-w-xl mx-auto p-4 flex flex-col gap-6 pb-40">
        <!-- Generado por JS -->
    </main>

    <!-- Modal del Carrito y Pago -->
    <div id="cart-modal" class="modal" onclick="if(event.target == this) toggleModal('cart-modal')">
        <div class="modal-content animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-extrabold text-blue-900">Tu Pedido</h2>
                <button onclick="toggleModal('cart-modal')" class="text-slate-400">Cerrar</button>
            </div>

            <div id="cart-list" class="flex flex-col gap-4 mb-8">
                <!-- Lista de productos con botón de eliminar -->
            </div>

            <!-- Sección de Pago -->
            <div class="bg-blue-50 rounded-2xl p-4 mb-6 border border-blue-100">
                <h3 class="text-sm font-black text-blue-900 uppercase mb-3 tracking-widest">Información de Pago</h3>
                <div class="text-sm text-blue-800 space-y-1">
                    <p><strong>Pago Móvil:</strong> Banesco (0134)</p>
                    <p><strong>V-18.850.000</strong> | <strong>0424-364.4026</strong></p>
                    <hr class="my-2 border-blue-200">
                    <p><strong>Zelle:</strong> pagos@stockdental.com</p>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-slate-500 uppercase text-xs">Total a Pagar</span>
                <span id="modal-total" class="text-2xl font-black text-blue-900">0 Bs.</span>
            </div>

            <button onclick="sendWhatsApp()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-200">CONFIRMAR Y ENVIAR COMPROBANTE</button>
        </div>
    </div>

    <script>
        const productos = [
            { id: 1, name: "Yeso Whip Mix T4", price: 6599, cat: "tecnico", img: "https://images.unsplash.com/photo-1593054990995-23ba6e87779b?w=400", desc: "Yeso extraduro para troqueles." },
            { id: 2, name: "Guantes de Nitrilo", price: 5628, cat: "odontologo", img: "https://images.unsplash.com/photo-1584622781564-1d9876a13d00?w=400", desc: "Caja de 100u. Alta resistencia." },
            { id: 3, name: "Cera Base Bon Dent", price: 7198, cat: "tecnico", img: "https://images.unsplash.com/photo-1551076805-e1869033e561?w=400", desc: "Modelado de prótesis rosa." },
            { id: 4, name: "Acrílico Líquido 120ml", price: 3666, cat: "tecnico", img: "https://images.unsplash.com/photo-1581056334462-1811b6973e67?w=400", desc: "Monomero autopolimerizable." }
        ];

        let cart = [];

        function render(filterCat = 'todos') {
            const container = document.getElementById('catalog');
            container.innerHTML = "";
            const filtered = filterCat === 'todos' ? productos : productos.filter(p => p.cat === filterCat);
            
            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="w-full h-48 object-cover" alt="${p.name}">
                        <div class="p-6">
                            <h3 class="text-xl font-extrabold text-blue-900 mb-1">${p.name}</h3>
                            <p class="text-sm text-slate-400 mb-4">${p.desc}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-black text-blue-600">${p.price.toLocaleString('es-VE')} <small class="text-xs">Bs.</small></span>
                                <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 active:scale-95 transition-transform">Agregar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const item = productos.find(p => p.id === id);
            cart.push({...item, cartId: Date.now()});
            updateUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateUI();
            updateCartList();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((acc, item) => acc + item.price, 0);
            document.getElementById('modal-total').innerText = total.toLocaleString('es-VE') + " Bs.";
        }

        function updateCartList() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.length === 0 ? "<p class='text-center text-slate-400 py-4'>Tu carrito está vacío</p>" : "";
            cart.forEach(item => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div class="flex flex-col">
                            <span class="font-bold text-blue-900 text-sm">${item.name}</span>
                            <span class="text-xs font-bold text-blue-500">${item.price.toLocaleString('es-VE')} Bs.</span>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="p-2 bg-red-50 text-red-500 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `;
            });
        }

        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('active');
            if(modal.classList.contains('active')) updateCartList();
        }

        function sendWhatsApp() {
            if(cart.length === 0) return alert("Agrega productos primero");
            const total = cart.reduce((acc, item) => acc + item.price, 0);
            let message = "🦷 *PEDIDO STOCKDENTAL*%0A";
            cart.forEach(item => message += `• ${item.name} (%5F${item.price.toLocaleString('es-VE')} Bs.%5F)%0A`);
            message += `%0A💰 *TOTAL: ${total.toLocaleString('es-VE')} Bs.*%0A%0A📱 _Adjunto captura del pago realizado._`;
            window.open(`https://wa.me/584243644026?text=${message}`);
        }

        render();
    </script>
</body>
</html>
